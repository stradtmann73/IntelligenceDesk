name: Validate Snapshot

on:
  workflow_dispatch:
  push:
    paths:
      - "data/current/snapshot.json"
      - "data/current/review-summary.json"
      - "src/lib/schema/**"
      - "scripts/validate-current.ts"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate current snapshot
        run: npm run validate:snapshot
